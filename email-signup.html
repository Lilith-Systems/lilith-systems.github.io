<!-- Add to index.html contact section -->
<section class="email-signup" style="padding: 60px 0;">
    <div class="container">
        <h2 style="color: var(--cyan); margin-bottom: 24px;">Join Lilith Systems Updates</h2>
        <form action="https://api.lilith.systems/email/subscribe" method="POST" style="display: flex; gap: 12px; max-width: 480px;">
            <input type="email" name="email" placeholder="your@email.com" required style="flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1rem;">
            <button type="submit" class="btn">Subscribe</button>
        </form>
        <p style="color: var(--muted); font-size: 0.85rem; margin-top: 12px;">Powered by Himalaya + Polsia agent automation. No spam, only sovereign updates.</p>
    </div>
</section>
